services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: football-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: football-ai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: football-ai-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://football-ai-frontend.onrender.com
      # Add your API keys in the Render dashboard after deploying
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: football-ai-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      # These are passed as Docker build args (baked into the Next.js build)
      - key: NEXT_PUBLIC_API_URL
        value: https://football-ai-backend.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://football-ai-backend.onrender.com

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: football-ai-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info -Q predictions,analytics
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: football-ai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: football-ai-redis
          property: connectionString
      # Copy SECRET_KEY value from football-ai-backend service in Render dashboard
      - key: SECRET_KEY
        sync: false

  # ─── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: football-ai-redis
    maxmemoryPolicy: noeviction
    ipAllowList: []

# ─── Postgres ───────────────────────────────────────────────────────────────
databases:
  - name: football-ai-postgres
    databaseName: football_ai
    user: fai_user
